services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ruthere
      POSTGRES_PASSWORD: ruthere
      POSTGRES_DB: ruthere
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ruthere"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://ruthere:ruthere@db:5432/ruthere
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
